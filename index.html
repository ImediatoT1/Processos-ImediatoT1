<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Processos T1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/avif" href="assets/logo.avif">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
</head>
<body>
    <div class="app" id="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <header class="tree-head">
                    <img class="logo" src="assets/logo.avif" alt="Imediato" onerror="this.style.display='none'" />
                    <h1 class="brand-name">Processos T1</h1>
                    <p class="brand-bio">Manuais de indicadores</p>
                </header>

                <div class="search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                    <input id="searchInput" type="search" placeholder="Buscar manual…" aria-label="Buscar manual" autocomplete="off" />
                </div>

                <nav class="links" id="links" aria-label="Categorias"></nav>

                <p class="empty" id="emptyState" hidden>Nada encontrado.</p>

                <footer class="tree-foot">
                    <span>Última atualização 14/05/2026</span>
                </footer>
            </div>
        </aside>

        <main class="viewer" id="viewer" aria-label="Visualizador de PDF">
            <header class="viewer-bar">
                <button class="vbtn vbtn-square" data-toggle-sidebar title="Recolher menu" aria-label="Recolher menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
                </button>
                <div class="viewer-meta">
                    <span class="viewer-tag" id="viewerTag">—</span>
                    <h2 class="viewer-title" id="viewerTitle">Selecione um manual</h2>
                </div>
                <div class="viewer-actions">
                    <a class="vbtn vbtn-square" id="viewerOpen" href="#" target="_blank" rel="noopener" title="Abrir em nova aba" aria-label="Abrir em nova aba">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>
                    </a>
                    <a class="vbtn vbtn-square" id="viewerDownload" href="#" download title="Baixar" aria-label="Baixar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </a>
                    <button class="vbtn vbtn-square close-viewer" data-close-viewer title="Fechar" aria-label="Fechar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </header>

            <div class="viewer-body">
                <div class="viewer-empty" id="viewerEmpty">
                    <div class="viewer-empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
                    </div>
                    <h3>Selecione um manual</h3>
                    <p>Escolha um manual no menu para visualizar aqui.</p>
                </div>
                <div id="pdfCanvas" class="pdf-canvas" aria-label="Visualizador de PDF"></div>
                <div class="pdf-loader" id="pdfLoader" hidden>
                    <div class="spinner"></div>
                </div>
            </div>
        </main>

        <button class="floating-toggle" id="showSidebarBtn" data-show-sidebar aria-label="Mostrar menu" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
